name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: corepack enable
      - run: corepack prepare pnpm@10.33.1 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm run package:build
      - uses: actions/upload-artifact@v4
        with:
          name: unn-corp.ungate-vsix
          path: apps/extension/out/ungate.vsix
          if-no-files-found: error
